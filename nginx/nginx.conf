server {
    listen 80;
    server_name flagtrack;

    # ── Static React app ──────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # All non-API routes go to index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── PostgREST API proxy ───────────────────────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding to PostgREST
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://postgrest:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow PostgREST bulk operations
        proxy_set_header   Prefer           $http_prefer;

        # CORS headers (Tailscale only, but harmless to include)
        add_header Access-Control-Allow-Origin  *  always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Prefer, Range" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
