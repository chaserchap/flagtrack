services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-flagtrack}
      POSTGRES_USER:     ${POSTGRES_USER:-flagtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flagtrack}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── PostgREST ───────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI:             postgres://${POSTGRES_USER:-flagtrack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-flagtrack}
      PGRST_DB_SCHEMA:          public
      PGRST_DB_ANON_ROLE:       web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://flagtrack:80/api
      # Disable JWT auth — Tailscale ACL handles access control
      PGRST_JWT_SECRET:         ""
    networks:
      - internal

  # ── App (Nginx serving built React + proxy to PostgREST) ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
